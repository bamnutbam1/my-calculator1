<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เครื่องคิดเลข</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --surface2: #f0f2f5;
      --surface3: #e4e8ef;
      --border: rgba(0,0,0,0.1);
      --text: #1a1c20;
      --text2: #5a6072;
      --text3: #9aa0b0;
      --blue: #185FA5;
      --blue-light: #d6e8f7;
      --blue-text: #185FA5;
      --red-light: #fde8e8;
      --red-text: #A32D2D;
      --amber-light: #fff3dc;
      --amber-text: #854F0B;
      --display-bg: #1a2740;
      --display-text: #e8f0fb;
      --display-sub: #7a9cc0;
      --radius: 20px;
      --radius-btn: 14px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111318;
        --surface: #1c1f26;
        --surface2: #252932;
        --surface3: #2e333d;
        --border: rgba(255,255,255,0.08);
        --text: #e8ecf4;
        --text2: #8a92a8;
        --text3: #555e72;
        --blue-light: #1a3050;
        --blue-text: #7ab8f0;
        --red-light: #2e1515;
        --red-text: #f09595;
        --amber-light: #2a1e08;
        --amber-text: #EF9F27;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px 40px;
    }
    #wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 680px;
    }
    .calc-side {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .display {
      background: var(--display-bg);
      border-radius: 16px;
      padding: 18px 18px 14px;
      text-align: right;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .display-expr {
      font-size: 13px;
      color: var(--display-sub);
      min-height: 18px;
      word-break: break-all;
      margin-bottom: 4px;
    }
    .display-main {
      font-size: 44px;
      font-weight: 500;
      color: var(--display-text);
      word-break: break-all;
      line-height: 1.1;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .btn {
      border: none;
      border-radius: var(--radius-btn);
      font-size: 22px;
      font-weight: 500;
      padding: 0;
      height: 64px;
      cursor: pointer;
      transition: opacity 0.1s, transform 0.08s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
    }
    .btn:active { transform: scale(0.93); opacity: 0.75; }
    .btn-num {
      background: var(--surface2);
      color: var(--text);
    }
    .btn-num:hover { background: var(--surface3); }
    .btn-op {
      background: var(--blue-light);
      color: var(--blue-text);
    }
    .btn-op:hover { opacity: 0.85; }
    .btn-op.active {
      background: var(--blue);
      color: #fff;
    }
    .btn-eq {
      background: var(--blue);
      color: #fff;
    }
    .btn-eq:hover { opacity: 0.88; }
    .btn-ac {
      background: var(--red-light);
      color: var(--red-text);
      font-size: 18px;
    }
    .btn-ac:hover { opacity: 0.88; }
    .btn-back {
      background: var(--amber-light);
      color: var(--amber-text);
      font-size: 20px;
    }
    .btn-back:hover { opacity: 0.88; }
    .btn-zero { grid-column: span 2; }

    /* History */
    .history-side {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-height: 560px;
    }
    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-shrink: 0;
    }
    .history-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text2);
    }
    .clear-btn {
      font-size: 12px;
      color: var(--red-text);
      background: var(--red-light);
      border: none;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 8px;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .clear-btn:hover { opacity: 0.85; }
    .history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 2px;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .h-item {
      background: var(--surface2);
      border-radius: 12px;
      padding: 10px 12px;
      cursor: pointer;
      border: 0.5px solid transparent;
      transition: border-color 0.15s;
    }
    .h-item:hover { border-color: var(--blue); }
    .h-item:active { opacity: 0.8; }
    .h-expr { font-size: 12px; color: var(--text2); word-break: break-all; }
    .h-result { font-size: 17px; font-weight: 500; color: var(--text); margin-top: 2px; }
    .h-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .h-empty {
      color: var(--text3);
      font-size: 13px;
      text-align: center;
      margin-top: 50px;
      line-height: 1.8;
    }

    @media (max-width: 520px) {
      #wrap { grid-template-columns: 1fr; }
      .history-side { max-height: 260px; }
      .btn { height: 60px; font-size: 20px; }
      .display-main { font-size: 38px; }
    }
  </style>
</head>
<body>
<div id="wrap">
  <div class="calc-side">
    <div class="display">
      <div class="display-expr" id="expr"></div>
      <div class="display-main" id="main">0</div>
    </div>
    <div class="btn-grid">
      <button class="btn btn-ac" onclick="clearAll()">AC</button>
      <button class="btn btn-back" onclick="backspace()">⌫</button>
      <button class="btn btn-op" id="op-div" onclick="pressOp('/')">÷</button>
      <button class="btn btn-op" id="op-mul" onclick="pressOp('*')">×</button>

      <button class="btn btn-num" onclick="pressNum('7')">7</button>
      <button class="btn btn-num" onclick="pressNum('8')">8</button>
      <button class="btn btn-num" onclick="pressNum('9')">9</button>
      <button class="btn btn-op" id="op-sub" onclick="pressOp('-')">−</button>

      <button class="btn btn-num" onclick="pressNum('4')">4</button>
      <button class="btn btn-num" onclick="pressNum('5')">5</button>
      <button class="btn btn-num" onclick="pressNum('6')">6</button>
      <button class="btn btn-op" id="op-add" onclick="pressOp('+')">+</button>

      <button class="btn btn-num" onclick="pressNum('1')">1</button>
      <button class="btn btn-num" onclick="pressNum('2')">2</button>
      <button class="btn btn-num" onclick="pressNum('3')">3</button>
      <button class="btn btn-eq" onclick="calculate()">=</button>

      <button class="btn btn-num btn-zero" onclick="pressNum('0')">0</button>
      <button class="btn btn-num" onclick="pressDot()">.</button>
      <div></div>
    </div>
  </div>

  <div class="history-side">
    <div class="history-header">
      <span class="history-title">ประวัติ</span>
      <button class="clear-btn" onclick="clearHistory()">ล้างทั้งหมด</button>
    </div>
    <div class="history-list" id="historyList">
      <p class="h-empty">ยังไม่มีประวัติ<br>ลองคำนวณดูสิ 🧮</p>
    </div>
  </div>
</div>

<script>
  let current = '0', prev = null, operator = null, justCalc = false, history = [];
  const mainEl = document.getElementById('main');
  const exprEl = document.getElementById('expr');
  const histEl = document.getElementById('historyList');
  const opBtns = { '+': 'op-add', '-': 'op-sub', '*': 'op-mul', '/': 'op-div' };

  function setActiveOp(op) {
    Object.values(opBtns).forEach(id => document.getElementById(id).classList.remove('active'));
    if (op) document.getElementById(opBtns[op]).classList.add('active');
  }

  function updateDisplay() {
    let d = current;
    if (d !== 'ข้อผิดพลาด' && d.length > 13)
      d = parseFloat(d).toExponential(4);
    mainEl.textContent = d;
  }

  function pressNum(n) {
    if (justCalc) { current = n; justCalc = false; setActiveOp(null); }
    else if (current === '0') current = n;
    else if (current.length < 14) current += n;
    updateDisplay();
  }

  function pressDot() {
    if (justCalc) { current = '0.'; justCalc = false; setActiveOp(null); return; }
    if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function backspace() {
    if (justCalc || current === 'ข้อผิดพลาด') { current = '0'; justCalc = false; setActiveOp(null); }
    else current = current.length > 1 ? current.slice(0, -1) : '0';
    updateDisplay();
  }

  function pressOp(op) {
    if (operator && !justCalc) computeIntermediate();
    prev = parseFloat(current);
    operator = op;
    justCalc = true;
    const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
    exprEl.textContent = prev + ' ' + sym;
    setActiveOp(op);
  }

  function computeIntermediate() {
    if (prev === null || operator === null) return;
    const a = prev, b = parseFloat(current);
    let r;
    if (operator === '+') r = a + b;
    else if (operator === '-') r = a - b;
    else if (operator === '*') r = a * b;
    else r = b === 0 ? 'ข้อผิดพลาด' : a / b;
    current = typeof r === 'number' ? parseFloat(r.toPrecision(12)).toString() : r;
    prev = typeof r === 'number' ? r : null;
  }

  function calculate() {
    if (operator === null || prev === null) return;
    const a = prev, b = parseFloat(current);
    const sym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator];
    const expr = a + ' ' + sym + ' ' + b;
    computeIntermediate();
    const result = current;
    exprEl.textContent = expr + ' =';
    justCalc = true;
    setActiveOp(null);
    operator = null; prev = null;
    addHistory(expr, result);
    updateDisplay();
  }

  function clearAll() {
    current = '0'; prev = null; operator = null; justCalc = false;
    exprEl.textContent = '';
    setActiveOp(null);
    updateDisplay();
  }

  function addHistory(expr, result) {
    const now = new Date();
    const t = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    history.unshift({ expr, result, t });
    if (history.length > 60) history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (!history.length) {
      histEl.innerHTML = '<p class="h-empty">ยังไม่มีประวัติ<br>ลองคำนวณดูสิ 🧮</p>';
      return;
    }
    histEl.innerHTML = history.map((h, i) =>
      `<div class="h-item" onclick="useHistory(${i})">
        <div class="h-expr">${h.expr}</div>
        <div class="h-result">= ${h.result}</div>
        <div class="h-time">${h.t}</div>
      </div>`
    ).join('');
  }

  function useHistory(i) {
    current = history[i].result;
    justCalc = false;
    exprEl.textContent = history[i].expr + ' =';
    setActiveOp(null);
    updateDisplay();
  }

  function clearHistory() { history = []; renderHistory(); }

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') pressNum(e.key);
    else if (e.key === '.') pressDot();
    else if (e.key === '+') pressOp('+');
    else if (e.key === '-') pressOp('-');
    else if (e.key === '*') pressOp('*');
    else if (e.key === '/') { e.preventDefault(); pressOp('/'); }
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Escape') clearAll();
    else if (e.key === 'Backspace') backspace();
  });
</script>
</body>
</html>
